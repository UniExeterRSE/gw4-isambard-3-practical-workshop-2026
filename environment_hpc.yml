name: hpc
channels:
- conda-forge/label/mpi-external
- conda-forge
- nodefaults
dependencies:
- python >=3.12,<3.13
- numpy >=2.4.3,<3
- numba >=0.65.0,<0.66
- mpi4py >=4.1.1,<5
- jupytext >=1.19.1,<2
- make >=4.4.1,<5
- pandoc >=3.9.0.2,<4
- qrcode >=8.2,<9
- pillow >=12.2.0,<13
- ruff >=0.15.11,<0.16
- go-shfmt >=3.13.1,<4
- lychee >=0.23.0,<0.24
- clang-format >=22.1.3,<23
- parallel >=20200322,<20260123
- mpich >=4.3.2,<5 external_*
- pip
- pip:
  - -e .
variables:
  PRESENTATION_PORT: '8001'
