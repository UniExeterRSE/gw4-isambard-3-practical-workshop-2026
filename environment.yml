name: default
channels:
- conda-forge
- nodefaults
dependencies:
- python >=3.12,<3.13
- numpy >=2,<3
- numba >=0.61,<0.62
- mpi4py >=4,<5
- jupytext >=1.18.1,<2
- make >=4.4.1,<5
- pandoc >=3.9,<4
- qrcode >=8.2,<9
- pillow >=12.1.1,<13
- ruff >=0.11,<1
- go-shfmt >=3.12,<4
- lychee >=0.23.0,<0.24
- clang-format >=22.1.3,<23
- pip
- pip:
  - -e .
variables:
  PRESENTATION_PORT: '8001'
