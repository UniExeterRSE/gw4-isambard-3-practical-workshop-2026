name: Docs

on:
  push:
  pull_request:
    branches:
      - dev
      - main

jobs:
  build:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       (github.head_ref == 'ci' || github.head_ref == 'docs'))
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/reference/github-hosted-runners-reference#standard-github-hosted-runners-for--private-repositories
        # TODO: when we made the repo public, we should use a larger set of build matrix:
        # https://docs.github.com/en/actions/reference/github-hosted-runners-reference#standard-github-hosted-runners-for-public-repositories
        os:
          # Linux-arm64 <- free for public repo only
          # - ubuntu-24.04-arm
          # Linux-x64
          - ubuntu-latest
          # macOS-arm64
          # - macos-latest
          # macOS-x64
          # - macos-15-intel
          # Windows-arm64 <- free for public repo only
          # - windows-11-arm
          # Windows-x64
          # - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          activate-environment: true
      - name: Run docs build
        run: pixi run docs
      - name: Check links
        run: pixi run linkcheck
      - name: Upload static files as artifact
        if: >-
          matrix.os == 'ubuntu-latest' && (
            (github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')) ||
            (github.event_name == 'pull_request' && (github.head_ref == 'ci' || github.head_ref == 'docs'))
          )
        id: deployment
        uses: actions/upload-pages-artifact@v5 # or specific "vX.X.X" version tag for this action
        with:
          path: src/
  deploy:
    if: >-
      (github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'pull_request' && (github.head_ref == 'ci' || github.head_ref == 'docs'))
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
