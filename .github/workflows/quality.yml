name: Quality

on:
  push:
  pull_request:

jobs:
  run-checks:
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/reference/github-hosted-runners-reference#standard-github-hosted-runners-for--private-repositories
        # TODO: when we made the repo public, we should use a larger set of build matrix:
        # https://docs.github.com/en/actions/reference/github-hosted-runners-reference#standard-github-hosted-runners-for-public-repositories
        os:
          # Linux-arm64 <- free for public repo only
          # - ubuntu-24.04-arm
          # Linux-x64
          - ubuntu-latest
          # macOS-arm64
          # - macos-latest
          # macOS-x64
          # - macos-15-intel
          # Windows-arm64 <- free for public repo only
          # - windows-11-arm
          # Windows-x64
          # - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          activate-environment: true
      - name: Check formatting
        run: |
          pixi run format
          git diff --exit-code
